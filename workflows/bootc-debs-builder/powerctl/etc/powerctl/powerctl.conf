# /etc/powerctl/powerctl.conf — power operating-point controller configuration.
# Sourced by bash: VAR=value assignments only.
# Every value below is the built-in default; uncomment to override.
# Calibrated tiers are stored separately in /var/lib/powerctl/tiers.conf.

# Preferred CPU governor (falls back to schedutil/ondemand/powersave if absent).
#GOVERNOR=schedutil

# energy_performance_preference (intel_pstate only): power|balance_power|
# balance_performance|performance.
#EPP=balance_power

# Seconds between control cycles.
#POLL_INTERVAL=20

# --- Calibration (disruptive: loads the CPU; runs only in an idle window) ---
# Number of frequency steps to probe when the frequency range is continuous.
#N_TIERS=6

# Core-saturation settle time and RAPL sampling window per tier, seconds.
#LOAD_SECS=4
#SAMPLE_SECS=3

# Efficiency knee: keep climbing tiers while the marginal MHz-per-watt stays at
# or above this percentage of the best step seen; stop at the first big drop.
#KNEE_FRACTION=50

# --- Real-time cap curve ----------------------------------------------------
# The cap floats continuously between the knee and the factory maximum: it rises
# while the workload is busy AND compute-bound (frequency buys real work), and
# falls toward the knee when idle or memory/IO-bound. Compute-boundedness is read
# from the PMU via perf; without perf it falls back to utilization alone.
#ESCALATE_UTIL=80          # Utilization (%) above which the cap may rise.
#DEESCALATE_UTIL=40        # Utilization (%) below which the cap falls to knee.
#IPC_BUSY=70               # IPC x100: at/above this the workload is compute-bound.
#IPC_SAMPLE_SECS=1         # perf sampling window per cycle, seconds.
#CAP_STEP_PCT=15           # Cap move per cycle, percent of the knee..max range.

# --- Idle-window gating for (re)calibration ---------------------------------
# Utilization considered idle, and how long it must last, before calibrating.
#IDLE_UTIL=10
#IDLE_WINDOW=300

# Pin scaling_min_freq to the hardware minimum so the governor can idle fully.
#SET_MIN_TO_HW=1

# --- Peripheral power management (each auto-skips if unsupported) ------------
# SATA link power: low power between commands, instant wake on I/O. Safe for a
# live ZFS pool (platters keep spinning, only the link idles). '' leaves it alone.
#SATA_ALPM=med_power_with_dipm

# Let idle PCI devices enter low power and wake on demand.
#PCI_RUNTIME_PM=1

# PCIe ASPM policy (powersave|powersupersave|default). Empty leaves the kernel
# default: forcing it can hang buggy devices, so it is off unless you set it.
#PCIE_ASPM=

# Spin down idle rotational disks after N minutes (0 = off). ZFS-backed, mounted
# and root disks are always excluded; wake is automatic on access. Needs hdparm.
#DISK_SPINDOWN_MIN=0

# Cap GPU power at N% of its factory maximum (0 = leave factory). Datasheet-safe.
# Auto-detects NVIDIA (needs nvidia-smi) and AMD (amdgpu sysfs).
#GPU_POWER_PCT=0

# USB autosuspend: leave | on (power saving) | off (always powered, link stability).
#USB_AUTOSUSPEND=leave

# Re-enable any disabled CPU idle C-state (1 = ensure deep idle available).
#CSTATES_ENSURE=1

# Dynamic vm.swappiness driven by the interval-averaged CPU load: low under heavy
# load (keep the working set resident), higher at idle (reclaim inactive pages
# for cache). Uses the averaged "load", not the noisy instantaneous frequency.
#SWAPPINESS_DYNAMIC=1
#SWAPPINESS_MIN=1
#SWAPPINESS_MAX=60
#SWAPPINESS_STEP=5

# Re-apply peripheral power management every N control cycles.
#REAPPLY_EVERY=30
