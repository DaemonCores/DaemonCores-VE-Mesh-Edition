# The onboard Matrox G200 (mgag200) on Dell servers has no attached monitor when
# headless, so the DRM connector poll re-reads a garbage EDID every ~10 s and
# floods the kernel log with "EDID block 0 checksum is invalid". drm_kms_helper
# is built into the Proxmox kernel, so its `poll` parameter can only be set on
# the kernel command line — not via modprobe.d. Disable connector polling.
kargs = ["drm_kms_helper.poll=0"]
